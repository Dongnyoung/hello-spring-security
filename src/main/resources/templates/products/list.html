<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>&#49345;&#54408; &#47785;&#47197; - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .table thead { background: #0f3460; color: #fff; }
        .table tbody tr:hover { background-color: #f0f4ff; }
        .badge-stock-high { background-color: #22c55e; }
        .badge-stock-low { background-color: #f59e0b; }
        .badge-stock-out { background-color: #ef4444; }
        .product-price { font-weight: 700; color: #e94560; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">&#54856;</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">&#49345;&#54408; &#47785;&#47197;</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">&#49345;&#54408; &#46321;&#47197;</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">&#44288;&#47532;&#51088;</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">&#47196;&#44536;&#50500;&#50883;</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="page-header">
            <h4 class="fw-bold mb-0">&#49345;&#54408; &#47785;&#47197;</h4>
            <small class="text-muted">
                &#52509; <span th:text="${productPage.totalElements}"></span>&#44060; &#49345;&#54408;
                (&#54168;&#51060;&#51648; <span th:text="${productPage.totalPages == 0 ? 0 : productPage.number + 1}"></span>
                / <span th:text="${productPage.totalPages}"></span>)
            </small>
        </div>
        <a th:href="@{/products/add}" class="btn btn-danger btn-sm px-4 fw-semibold"
           sec:authorize="hasRole('ADMIN')">+ &#49345;&#54408; &#46321;&#47197;</a>
    </div>

    <form th:action="@{/products}" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="keyword" class="form-control"
               placeholder="&#49345;&#54408;&#47749;&#51004;&#47196; &#44160;&#49353;"
               th:value="${keyword}"/>
        <input type="hidden" name="size" th:value="${productPage.size}"/>
        <button type="submit" class="btn btn-primary px-4">&#44160;&#49353;</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary">&#52488;&#44592;&#54868;</a>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${productPage.isEmpty()}" class="text-center py-5 text-muted">
                <p class="mb-0">&#44160;&#49353; &#44208;&#44284;&#44032; &#50630;&#49845;&#45768;&#45796;.</p>
            </div>
            <div th:unless="${productPage.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th class="ps-4" style="width:60px">#</th>
                            <th>&#49345;&#54408;&#47749;</th>
                            <th>&#49444;&#47749;</th>
                            <th class="text-end">&#44032;&#44201;</th>
                            <th class="text-center">&#51116;&#44256;</th>
                            <th class="text-center">&#46321;&#47197;&#51068;</th>
                            <th class="text-center" sec:authorize="hasRole('ADMIN')">&#44288;&#47532;</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${productPage.content}">
                            <td class="ps-4 text-muted small" th:text="${p.id}"></td>
                            <td>
                                <a th:href="@{/products/{id}(id=${p.id})}"
                                   class="text-decoration-none fw-semibold text-dark"
                                   th:text="${p.name}"></a>
                            </td>
                            <td class="text-muted small" th:text="${p.description}"></td>
                            <td class="text-end product-price"
                                th:text="${#numbers.formatInteger(p.price, 1, 'COMMA') + '&#50896;'}"></td>
                            <td class="text-center">
                                <span th:if="${p.stock > 10}" class="badge badge-stock-high"
                                      th:text="${p.stock}"></span>
                                <span th:if="${p.stock > 0 and p.stock <= 10}" class="badge badge-stock-low"
                                      th:text="${p.stock}"></span>
                                <span th:if="${p.stock == 0}" class="badge badge-stock-out">&#54408;&#51208;</span>
                            </td>
                            <td class="text-center text-muted small"
                                th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}"></td>
                            <td class="text-center" sec:authorize="hasRole('ADMIN')">
                                <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post"
                                      onsubmit="return confirm('삭제하시겠습니까?')">
                                    <button class="btn btn-outline-danger btn-sm">&#49325;&#51228;</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="mt-3" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item disabled" th:if="${!productPage.hasPrevious()}">
                <span class="page-link">&#51060;&#51204;</span>
            </li>
            <li class="page-item" th:unless="${!productPage.hasPrevious()}">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${productPage.number - 1}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${productPage.number - 1}, size=${productPage.size})}">&#51060;&#51204;</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                class="page-item"
                th:classappend="${i == productPage.number} ? 'active'">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${i}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${i}, size=${productPage.size})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item disabled" th:if="${!productPage.hasNext()}">
                <span class="page-link">&#45796;&#51020;</span>
            </li>
            <li class="page-item" th:unless="${!productPage.hasNext()}">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${productPage.number + 1}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${productPage.number + 1}, size=${productPage.size})}">&#45796;&#51020;</a>
            </li>
        </ul>
    </nav>
</div>

<div th:replace="~{fragments/footer :: practiceFooter}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
